<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skills | Tupakula Siva Shankar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <h2 class="mb-4">Technical Skills</h2>
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-dark text-white">Full-Stack Development</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">
                            <div class="d-flex justify-content-between mb-1"><span>React & TypeScript</span> <span>90%</span></div>
                            <div class="progress"><div class="progress-bar bg-info" style="width: 90%"></div></div>
                        </li>
                        <li class="list-group-item">
                            <div class="d-flex justify-content-between mb-1"><span>Java & Python (FastAPI)</span> <span>85%</span></div>
                            <div class="progress"><div class="progress-bar bg-warning" style="width: 85%"></div></div>
                        </li>
                    </ul>
                </div>
            </div>
            
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-dark text-white">IoT, Embedded & CS Core</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item">
                            <div class="d-flex justify-content-between mb-1"><span>ESP32 & Raspberry Pi</span> <span>80%</span></div>
                            <div class="progress"><div class="progress-bar bg-danger" style="width: 80%"></div></div>
                        </li>
                        <li class="list-group-item">
                            <div class="d-flex justify-content-between mb-1"><span>C & Data Structures</span> <span>85%</span></div>
                            <div class="progress"><div class="progress-bar bg-success" style="width: 85%"></div></div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
